[application]
name = "trading-bot"
port = 8080

[application.config]
activate.profiles = ["default"]
locations = ["."]
file_names = ["config.toml"]

[application.cloud.discovery]
address = "http://127.0.0.1:8500"
token = ""
service.check.address = "http://127.0.0.1:8080/actuator/health"
service.check.interval = "30s"

[application.cloud.config]
enabled = false
address = "http://127.0.0.1:8500"
token = ""

[logger]
enabled = true
level = "info"
file = "trading-bot-server.log"
log_dir = "./logs"
