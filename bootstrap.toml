[bootstrap]
application.name = "trading-bot"

[bootstrap.config]
activate.profiles = ["default"]
locations = ["."]
file_names = ["config.toml"]

[bootstrap.cloud.discovery]
address = "http://127.0.0.1:8500"
token = ""
service.check.address = "http://127.0.0.1:8080/health/check"
service.check.interval = "30s"

[bootstrap.cloud.config]
enabled = false
address = "http://127.0.0.1:8500"
token = ""
